experiment_name: peak_binary_xgb

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment_name: chessquant-lab

paths:
  features_parquet: data/features/Matumnich_features.parquet
  output_root: artifacts/models

schema:
  group_col: session_id
  order_col: created_at_ms
  time_col: created_at_ms
  cum_pl_col: session_pl
  keep_numeric_only: true
  drop_cols:
      - game_id
      - user_color
      - session_id
      - created_at_ms
      - last_move_at_ms
      - is_max
      - first_max_game
      - session_max
      - target

objective:
  kind: peak_binary

split:
  n_splits: 5
  group_gap: 1

model:
  kind: xgb_classifier
  params:
    n_estimators: 150
    max_depth: 3
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1
    eval_metric: logloss